services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiaoshuo_backend
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 90"
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  db:
    image: postgres:16
    container_name: xiaoshuo_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xiaoshuo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xiaoshuo_redis_prod

  nginx:
    image: nginx:1.27-alpine
    container_name: xiaoshuo_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  static_volume:
  media_volume: